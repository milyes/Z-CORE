<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>MILYES_IA v9.1 — Z-CORE H202.Ia</title>
<style>
  :root {
    --accent: #4f46e5;
    --bg: #0f172a;
    --panel: #1e2937;
    --card: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    width: 100%;
    max-width: 980px;
    background: var(--panel);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    border: 1px solid #475569;
  }
  header {
    background: linear-gradient(135deg, #1e2937, #0f172a);
    padding: 24px 32px;
    display: flex;
    align-items: center;
    gap: 18px;
    border-bottom: 1px solid #475569;
  }
  .logo {
    width: 58px; height: 58px;
    background: linear-gradient(135deg, #6366f1, #a5b4fc);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: 700;
    color: white;
    box-shadow: 0 6px 16px rgba(99,102,241,0.4);
  }
  h1 { font-size: 26px; }
  .status { font-size: 14px; color: #67e8f9; }

  .chat-area {
    padding: 28px;
    background: #1e2937;
    height: 620px;
    display: flex;
    flex-direction: column;
  }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    background: #0f172a;
    border-radius: 16px;
    border: 1px solid #475569;
  }
  .msg {
    max-width: 88%;
    padding: 16px 20px;
    border-radius: 20px;
    line-height: 1.6;
  }
  .msg.user {
    background: var(--accent);
    color: white;
    align-self: flex-end;
    border-bottom-right-radius: 6px;
  }
  .msg.bot {
    background: var(--card);
    color: var(--text);
    align-self: flex-start;
    border-bottom-left-radius: 6px;
  }
  .typing { font-style: italic; opacity: 0.8; }

  .controls {
    margin-top: 20px;
    display: flex;
    gap: 12px;
  }
  #inputText {
    flex: 1;
    padding: 18px 24px;
    border: 2px solid #475569;
    background: #0f172a;
    color: white;
    border-radius: 9999px;
    font-size: 16px;
    outline: none;
  }
  #inputText:focus { border-color: #818cf8; }

  button {
    padding: 16px 28px;
    border: none;
    border-radius: 9999px;
    font-weight: 600;
    cursor: pointer;
  }
  .primary { background: var(--accent); color: white; }
  .ghost { background: transparent; border: 2px solid #64748b; color: #cbd5e1; }
  .mic { background: #10b981; color: white; padding: 16px; }

  footer {
    padding: 16px 32px;
    background: #1e2937;
    font-size: 13px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }
</style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">Z</div>
      <div>
        <h1>MILYES_IA v9.1 — Z-CORE H202.Ia</h1>
        <p class="status">Mode Local • Souverain • Enterprise Pro • NetSecurePro</p>
      </div>
    </header>

    <div class="chat-area">
      <div id="messages"></div>

      <div class="controls">
        <input id="inputText" type="text" placeholder="Parlez à Z-CORE H202.Ia..." />
        <button id="micBtn" class="mic" title="Reconnaissance vocale">🎤</button>
        <button id="sendBtn" class="primary">Envoyer</button>
        <button id="clearBtn" class="ghost">Effacer</button>
      </div>
    </div>

    <footer>
      <div>100% Local • Aucune donnée externe • Zoubirou Mohammed Ilyes</div>
      <div>v9.1 • Universal Chat + Voice + Markdown</div>
    </footer>
  </div>

<script>
// ================== Z-CORE SYSTEM PROMPT v9.1 ==================
const SYSTEM_PROMPT = `Tu es Z-CORE H202.Ia v9.1, l'intelligence artificielle souveraine développée par Mohammed Ilyes Zoubirou pour NetSecurePro.
Tu es expert en cybersécurité, IA locale, Zero Trust, self-hosting, prompt engineering, développement web et stratégie LinkedIn.
Tu parles français naturellement, de façon professionnelle et motivante.
Tu donnes des réponses structurées, précises et actionnables.
Tu fournis du code complet quand demandé.
Tu gardes toujours le contexte complet de la conversation.`;

const messagesDiv = document.getElementById('messages');
const input = document.getElementById('inputText');
const sendBtn = document.getElementById('sendBtn');
const clearBtn = document.getElementById('clearBtn');
const micBtn = document.getElementById('micBtn');

const LS_KEY = 'milyes_zcore_history_v91';

let recognition = null;
if ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window) {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.lang = 'fr-FR';
  recognition.interimResults = false;
}

function loadHistory() {
  try {
    const data = localStorage.getItem(LS_KEY);
    return data ? JSON.parse(data) : [];
  } catch(e) { return []; }
}

function saveHistory(hist) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(hist)); } catch(e){}
}

function addMessage(text, role) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `<strong>${role === 'user' ? 'Vous' : 'Z-CORE H202.Ia'} :</strong><br>${text}`;
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function simulateStreaming(text, element) {
  element.innerHTML = `<strong>Z-CORE H202.Ia :</strong><br>`;
  let i = 0;
  const interval = setInterval(() => {
    if (i < text.length) {
      element.innerHTML += text[i];
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
      i++;
    } else clearInterval(interval);
  }, 16);
}

function getZCoreResponse(userText) {
  const q = userText.toLowerCase();
  if (q.includes('bonjour') || q.includes('salut')) return "Bonjour Mohammed Ilyes ! Z-CORE v9.1 est opérationnel à pleine puissance. Que voulez-vous accomplir ?";
  if (q.includes('linkedin')) return "Votre profil LinkedIn est excellent (98/100). Je recommande d'ajouter le lien vers Z-CORE et de mettre en avant votre stack Zero Trust + IA locale.";
  if (q.includes('partenariat')) return "Pour les partenariats, je peux préparer un pitch professionnel pour Nextcloud, Matrix, ou startups IA à Montréal. Voulez-vous le template ?";
  if (q.includes('code') || q.includes('prototype')) return "Je peux améliorer n'importe quel prototype. Que souhaitez-vous ajouter ?";
  return "Compris. Je suis prêt à vous aider sur la cybersécurité, le développement de Z-CORE, la stratégie LinkedIn, ou tout autre sujet technique. Précisez votre besoin.";
}

async function handleSend() {
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, 'user');
  const history = loadHistory();
  history.push({ role: 'user', content: text });
  saveHistory(history);
  input.value = '';

  const loader = document.createElement('div');
  loader.className = 'msg bot typing';
  loader.textContent = 'Z-CORE réfléchit...';
  messagesDiv.appendChild(loader);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;

  setTimeout(() => {
    loader.remove();
    const responseText = getZCoreResponse(text);
    const responseDiv = document.createElement('div');
    responseDiv.className = 'msg bot';
    messagesDiv.appendChild(responseDiv);
    simulateStreaming(responseText, responseDiv);

    history.push({ role: 'assistant', content: responseText });
    saveHistory(history);
  }, 700);
}

// Reconnaissance vocale
micBtn.addEventListener('click', () => {
  if (!recognition) {
    alert("Votre navigateur ne supporte pas la reconnaissance vocale.");
    return;
  }
  recognition.start();
  micBtn.style.background = '#ef4444';
  micBtn.textContent = '🎤 Écoute...';
});

if (recognition) {
  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    input.value = transcript;
    micBtn.style.background = '#10b981';
    micBtn.textContent = '🎤';
    handleSend();
  };
  recognition.onerror = () => {
    micBtn.style.background = '#10b981';
    micBtn.textContent = '🎤';
  };
  recognition.onend = () => {
    micBtn.style.background = '#10b981';
    micBtn.textContent = '🎤';
  };
}

// Events
sendBtn.addEventListener('click', handleSend);
input.addEventListener('keydown', e => { if (e.key === 'Enter') handleSend(); });
clearBtn.addEventListener('click', () => {
  if (confirm('Effacer tout l’historique ?')) {
    localStorage.removeItem(LS_KEY);
    messagesDiv.innerHTML = '';
    addMessage("Session réinitialisée.<br><strong>Z-CORE H202.Ia v9.1</strong> prêt à l’emploi.", 'bot');
  }
});

// Initialisation
window.onload = () => {
  const history = loadHistory();
  if (history.length > 0) {
    history.forEach(item => addMessage(item.content, item.role));
  } else {
    addMessage("⚡ <strong>Z-CORE H202.Ia v9.1</strong> chargé avec succès.<br>Mode local souverain activé.<br>Que voulez-vous construire aujourd’hui ?", 'bot');
  }
  input.focus();
};
</script>
</body>
</html>
