<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Z-CORE v3 [SOUVERAIN]</title>
<script src="jspdf.umd.min.js"></script>
<style>
:root {
  --bg:#000; --gold:#d4af37; --green:#00ff41;
  --text:#e0e0e0; --panel:#0a0a0a; --red:#ff2d55;
}
*{box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Consolas',monospace;margin:0;padding:12px;}
.hud{border:2px solid var(--gold);padding:12px;text-align:center;font-weight:bold;
     letter-spacing:3px;margin-bottom:18px;box-shadow:0 0 12px rgba(212,175,55,.6);user-select:none;}
.nodes{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.node{border:1px solid #222;padding:12px;text-align:center;font-size:.85em;cursor:pointer;transition:all .2s;}
.node.active{border-color:var(--green);color:var(--green);
             background:rgba(0,255,65,.08);box-shadow:0 0 12px rgba(0,255,65,.5);}
textarea{width:100%;height:160px;background:var(--panel);color:var(--green);
         border:1px solid #111;padding:12px;margin-bottom:18px;resize:vertical;font-family:monospace;}
canvas{border:1px solid var(--gold);background:#030303;width:100%;height:160px;
       touch-action:none;margin-bottom:12px;box-shadow:0 0 12px rgba(212,175,55,.6);}
.btn{background:var(--gold);color:#000;border:none;padding:16px;width:100%;
     font-weight:bold;text-transform:uppercase;cursor:pointer;margin:8px 0;border-radius:4px;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.purge{background:var(--red);color:#fff;padding:8px 16px;border:none;
       cursor:pointer;margin-top:10px;display:none;border-radius:4px;width:100%;}
#status{font-size:.8em;margin:10px 0;text-align:center;color:#888;}
#status.ok{color:var(--green);}
#status.err{color:var(--red);font-weight:bold;}
#log{font-size:.75em;color:#555;margin-top:12px;min-height:20px;}
.pubkey-box{font-size:.6em;color:#444;word-break:break-all;margin:6px 0;padding:6px;
            border:1px solid #1a1a1a;background:#050505;max-height:40px;overflow:hidden;}
</style>
</head>
<body>

<div class="hud" ondblclick="document.querySelector('.purge').style.display='block'">
  Z-CORE v3 [SOUVERAIN — ROOT SCELLÉ]
</div>

<div id="status">INITIALISATION...</div>
<div class="pubkey-box" id="pubkeyDisplay">CLÉ PUBLIQUE : chargement...</div>

<div class="nodes">
  <div class="node" onclick="this.classList.toggle('active')">SÉCURITÉ</div>
  <div class="node" onclick="this.classList.toggle('active')">TECHNIQUE</div>
  <div class="node" onclick="this.classList.toggle('active')">QUALITÉ</div>
  <div class="node" onclick="this.classList.toggle('active')">RISQUE</div>
</div>

<textarea id="obs" placeholder="[RAW_DATA_FIELD v3 — INJECTER DONNÉES BRUTES]..."></textarea>

<div style="color:var(--gold);margin-bottom:6px;font-size:.85em;">SIGNATURE TACTILE ROOT :</div>
<canvas id="sig"></canvas>

<button class="btn" id="sealBtn" onclick="exportSealedPDF()" disabled>SCELLER &amp; EXPORTER (v3)</button>
<button class="purge" onclick="emergencyPurge()">PURGE D'URGENCE ROOT</button>

<div id="log">Z-CORE v3 → initialisation...</div>

<script>
// ─── CONSTANTES ────────────────────────────────────────────────────────────────
const LS_PRIV  = 'zcore_privkey_jwk';
const LS_PUB   = 'zcore_pubkey_jwk';
const LS_PUBHEX= 'zcore_pubkey_hex';

// ROOT_ID visible dans le source — inévitable côté client.
// Ne pas l'utiliser comme secret ; c'est un label d'identité, pas un token.
const ROOT_LABEL = "MZ@IA22";

// ─── ÉTAT ─────────────────────────────────────────────────────────────────────
let privateKey = null;
let publicKeyHex = '';

// ─── UTILS ────────────────────────────────────────────────────────────────────
const log  = msg => { document.getElementById('log').textContent = '> ' + msg; console.log(msg); };
const hex  = buf => Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
const enc  = new TextEncoder();

async function sha256(str) {
  return hex(await crypto.subtle.digest('SHA-256', enc.encode(str)));
}

// ─── KEYPAIR : génération + persistance JWK dans localStorage ─────────────────
// Pourquoi localStorage pour la clé privée ?
// Sur un fichier HTML local (file://) ou hébergé en intranet fermé, c'est
// le seul stockage synchrone fiable sans serveur. En production sur un serveur
// Z-CORE, remplacer par IndexedDB ou clé côté serveur via fetch POST.
// La clé privée JWK est lisible par toute extension malveillante — avertissement documenté.

async function loadOrGenerateKeypair() {
  const storedPriv = localStorage.getItem(LS_PRIV);
  const storedPub  = localStorage.getItem(LS_PUB);

  if (storedPriv && storedPub) {
    // Importer les clés existantes
    try {
      privateKey = await crypto.subtle.importKey(
        'jwk', JSON.parse(storedPriv),
        { name: 'Ed25519' }, false, ['sign']
      );
      const pubKey = await crypto.subtle.importKey(
        'jwk', JSON.parse(storedPub),
        { name: 'Ed25519' }, true, ['verify']
      );
      const rawPub = await crypto.subtle.exportKey('raw', pubKey);
      publicKeyHex = hex(rawPub);
      localStorage.setItem(LS_PUBHEX, publicKeyHex);
      log('KEYPAIR ED25519 CHARGÉ DEPUIS STOCKAGE LOCAL');
      return true;
    } catch(e) {
      log('ERREUR IMPORT CLÉ — RÉGÉNÉRATION');
      localStorage.removeItem(LS_PRIV);
      localStorage.removeItem(LS_PUB);
      localStorage.removeItem(LS_PUBHEX);
    }
  }

  // Génération première fois
  const kp = await crypto.subtle.generateKey(
    { name: 'Ed25519' }, true, ['sign', 'verify']
  );

  const privJwk = await crypto.subtle.exportKey('jwk', kp.privateKey);
  const pubJwk  = await crypto.subtle.exportKey('jwk', kp.publicKey);
  const rawPub  = await crypto.subtle.exportKey('raw',  kp.publicKey);

  privateKey    = kp.privateKey;
  publicKeyHex  = hex(rawPub);

  localStorage.setItem(LS_PRIV,   JSON.stringify(privJwk));
  localStorage.setItem(LS_PUB,    JSON.stringify(pubJwk));
  localStorage.setItem(LS_PUBHEX, publicKeyHex);

  log('NOUVEAU KEYPAIR ED25519 GÉNÉRÉ & PERSISTÉ');
  return true;
}

async function initRoot() {
  const ok = await loadOrGenerateKeypair();
  const el = document.getElementById('status');
  if (ok && privateKey) {
    el.textContent = `ROOT SCELLÉ [${ROOT_LABEL}] — CLÉ ACTIVE`;
    el.className   = 'ok';
    document.getElementById('pubkeyDisplay').textContent =
      'CLÉ PUBLIQUE : ' + publicKeyHex;
    document.getElementById('sealBtn').disabled = false;
  } else {
    el.textContent = 'ERREUR INIT — CLÉ INDISPONIBLE';
    el.className   = 'err';
  }
}

// ─── CANVAS SIGNATURE TACTILE ─────────────────────────────────────────────────
const canvas = document.getElementById('sig');
const ctx    = canvas.getContext('2d', { willReadFrequently: true });
let   drawing = false, lastT = 0;

function resizeCanvas() {
  const ratio = window.devicePixelRatio || 1;
  canvas.width  = canvas.offsetWidth  * ratio;
  canvas.height = canvas.offsetHeight * ratio;
  ctx.scale(ratio, ratio);
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

canvas.addEventListener('touchstart', e => {
  drawing = true;
  const t = e.touches[0], r = canvas.getBoundingClientRect();
  ctx.beginPath();
  ctx.moveTo(t.clientX - r.left, t.clientY - r.top);
});
canvas.addEventListener('touchmove', e => {
  if (!drawing) return;
  const now = performance.now();
  if (now - lastT < 16) return;
  lastT = now;
  e.preventDefault();
  const t = e.touches[0], r = canvas.getBoundingClientRect();
  ctx.lineTo(t.clientX - r.left, t.clientY - r.top);
  ctx.strokeStyle = '#00ff41';
  ctx.lineWidth   = 3;
  ctx.lineCap     = 'round';
  ctx.stroke();
});
canvas.addEventListener('touchend', () => drawing = false);

// Support souris (desktop)
canvas.addEventListener('mousedown', e => {
  drawing = true;
  const r = canvas.getBoundingClientRect();
  ctx.beginPath();
  ctx.moveTo(e.clientX - r.left, e.clientY - r.top);
});
canvas.addEventListener('mousemove', e => {
  if (!drawing) return;
  const r = canvas.getBoundingClientRect();
  ctx.lineTo(e.clientX - r.left, e.clientY - r.top);
  ctx.strokeStyle = '#00ff41'; ctx.lineWidth = 3; ctx.lineCap = 'round';
  ctx.stroke();
});
canvas.addEventListener('mouseup',   () => drawing = false);
canvas.addEventListener('mouseleave',() => drawing = false);

// ─── EXPORT PDF SCELLÉ ────────────────────────────────────────────────────────
async function exportSealedPDF() {
  if (!privateKey) return log('CLÉ PRIVÉE INDISPONIBLE — ABORT');

  const data = document.getElementById('obs').value.trim();
  if (!data) return log('AUCUNE DONNÉE → ABANDON');

  log('SCELLEMENT v3 → SHA-256 + ED25519...');

  const sigImg  = canvas.toDataURL('image/png', 0.85);
  const nodes   = Array.from(document.querySelectorAll('.node.active'))
                       .map(n => n.innerText).join(' | ') || 'AUCUN';
  const ts      = new Date().toISOString();
  const payload = `${ts}\n${data}\nNŒUDS: ${nodes}\nROOT_LABEL: ${ROOT_LABEL}`;

  // 1. SHA-256 du contenu
  const hashBuf  = await crypto.subtle.digest('SHA-256', enc.encode(payload));
  const hashHex  = hex(hashBuf);

  // 2. Signature Ed25519 sur le hash — RÉELLEMENT embarquée dans le PDF
  const sigBuf   = await crypto.subtle.sign('Ed25519', privateKey, hashBuf);
  const sigHex   = hex(sigBuf);   // 64 octets = 128 chars hex

  // 3. Construction PDF
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ compress: true });

  // Fond noir
  doc.setFillColor(0,0,0);
  doc.rect(0,0,210,297,'F');

  // En-tête
  doc.setTextColor(212,175,55); doc.setFontSize(18);
  doc.text('Z-CORE v3 — RAPPORT SCELLÉ', 105, 22, { align:'center' });

  doc.setDrawColor(212,175,55); doc.setLineWidth(0.3);
  doc.line(20, 26, 190, 26);

  // Bloc identité
  doc.setTextColor(180,180,180); doc.setFontSize(9);
  doc.text(`GÉNÉRÉ    : ${new Date().toLocaleString('fr-FR')}`, 20, 34);
  doc.text(`ROOT      : ${ROOT_LABEL}`, 20, 40);
  doc.text(`ALGO      : Ed25519 + SHA-256 (Web Crypto API)`, 20, 46);

  // Hash
  doc.setTextColor(0,220,60); doc.setFontSize(8);
  doc.text('HASH SHA-256 :', 20, 56);
  doc.setTextColor(200,200,200);
  doc.text(hashHex.slice(0,64),  22, 62);
  doc.text(hashHex.slice(64),    22, 67);

  // Clé publique (permet vérification externe)
  doc.setTextColor(0,220,60); doc.setFontSize(8);
  doc.text('CLÉ PUBLIQUE ED25519 :', 20, 77);
  doc.setTextColor(160,160,160);
  doc.text(publicKeyHex.slice(0,64), 22, 83);
  doc.text(publicKeyHex.slice(64),   22, 88);

  // SIGNATURE — le vrai sceau
  doc.setTextColor(212,175,55); doc.setFontSize(8);
  doc.text('SIGNATURE ED25519 (64 octets) :', 20, 98);
  doc.setTextColor(150,200,150); doc.setFontSize(7.5);
  doc.text(sigHex.slice(0,64),   22, 104);
  doc.text(sigHex.slice(64,128), 22, 109);

  // Séparateur
  doc.setDrawColor(50,50,50); doc.line(20, 115, 190, 115);

  // Données brutes
  doc.setTextColor(0,220,60); doc.setFontSize(9);
  doc.text('DONNÉES BRUTES SCELLÉES :', 20, 122);
  doc.setTextColor(220,220,220); doc.setFontSize(9);
  const lines = doc.splitTextToSize(data, 170);
  doc.text(lines, 20, 130);

  // Nœuds actifs
  doc.setTextColor(100,100,100); doc.setFontSize(8);
  doc.text(`NŒUDS ACTIFS : ${nodes}`, 20, Math.min(130 + lines.length*5 + 6, 230));

  // Signature tactile
  const sigY = Math.min(130 + lines.length*5 + 14, 236);
  doc.setTextColor(212,175,55); doc.setFontSize(9);
  doc.text('SIGNATURE TACTILE ROOT :', 20, sigY);
  doc.addImage(sigImg, 'PNG', 20, sigY+4, 80, 34, undefined, 'FAST');

  // Footer légal
  doc.setFontSize(6.5); doc.setTextColor(80,80,80);
  const footer =
    'DOCUMENT SCELLÉ CRYPTOGRAPHIQUEMENT. ALGORITHME : Ed25519 + SHA-256. ' +
    'VÉRIFICATION : importer CLÉ PUBLIQUE ci-dessus, vérifier SIGNATURE sur HASH. ' +
    'TOUTE MODIFICATION DU CONTENU INVALIDE LA SIGNATURE. Z-CORE v3 / IA22_LOGIC.';
  doc.text(doc.splitTextToSize(footer, 170), 20, 278);

  // Sauvegarde
  const filename = `ZCORE_v3_${Date.now()}_${hashHex.slice(0,8)}.pdf`;
  doc.save(filename);

  log(`EXPORTÉ : ${filename} | SIG: ${sigHex.slice(0,16)}...`);
}

// ─── VÉRIFICATION SIGNATURE (fonction utilitaire, appel console) ──────────────
// Usage : await verifyDoc(hashHex, sigHex, pubkeyHex)
window.verifyDoc = async function(hashHex, sigHex, pubkeyHex) {
  const fromHex = h => new Uint8Array(h.match(/.{2}/g).map(b=>parseInt(b,16)));
  const pubKey  = await crypto.subtle.importKey(
    'raw', fromHex(pubkeyHex), { name:'Ed25519' }, false, ['verify']
  );
  const valid = await crypto.subtle.verify(
    'Ed25519', pubKey, fromHex(sigHex), fromHex(hashHex)
  );
  console.log(valid ? '✓ SIGNATURE VALIDE' : '✗ SIGNATURE INVALIDE — DOCUMENT ALTÉRÉ');
  return valid;
};

// ─── PURGE D'URGENCE ──────────────────────────────────────────────────────────
function emergencyPurge() {
  if (!confirm("PURGE D'URGENCE — EFFACER DONNÉES, CANVAS ET CLÉS ?")) return;
  // Note : effacer les clés = les documents précédents ne sont plus vérifiables
  localStorage.clear();
  privateKey     = null;
  publicKeyHex   = '';
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  document.getElementById('obs').value = '';
  document.getElementById('sealBtn').disabled = true;
  document.getElementById('status').textContent = 'CLÉS PURGÉES — RECHARGEMENT REQUIS';
  document.getElementById('status').className   = 'err';
  document.getElementById('pubkeyDisplay').textContent = 'CLÉ PUBLIQUE : purgée';
  log('PURGE TERMINÉE — localStorage vidé, clés mémoire effacées');
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  initRoot();
});
</script>

<!--
  VÉRIFICATION HORS-LIGNE D'UN DOCUMENT SCELLÉ :
  Dans la console du navigateur :

    await verifyDoc(
      "hashHex_depuis_le_PDF",
      "sigHex_depuis_le_PDF",
      "pubkeyHex_depuis_le_PDF"
    );

  Si le contenu a été modifié → "SIGNATURE INVALIDE — DOCUMENT ALTÉRÉ"
  La clé publique est dans le PDF — aucune infrastructure requise pour vérifier.
-->
</body>
</html>
